name: CI

on:
  push:
    branches:
      - master
      - release
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.11
          bundler-cache: true
      - run: bundle exec rake
      - run: docker build --tag 0xda-market-broker-bot .
