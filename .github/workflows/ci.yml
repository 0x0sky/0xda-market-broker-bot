name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.11
          bundler-cache: true
      - run: bundle exec rake
      - run: docker build --tag 0xda-market-broker-bot .
